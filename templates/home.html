<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Employee Details</h1>
    <table border="2px solid">
        <tr>
            <th>emp_id</th>
        <th>emp_name</th>
        <th>emp_salary</th>

        </tr>
        {% for i in data%}
        <tr>
            <td>{{i.emp_id}}</td>
            <td>{{i.emp_name}}</td>
            <td>{{i.emp_salary}}</td>
        </tr>
        {% endfor %}
    </table><br><br><br>
    <form action="" method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Submit</button>
    </form>
</body>
</html>
